name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Lint and type-check
      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run typecheck

      # 5. Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 6. Run Playwright tests
      - name: Run Playwright tests
        run: npm run test:e2e -- --reporter=html
        env:
          BASE_URL: https://the-internet.herokuapp.com

      # 7. Upload Playwright HTML report as artifact
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10

      # 8. Optional: Display link to HTML report in GitHub Actions summary
      - name: Show Playwright report link
        if: ${{ always() }}
        run: |
          echo "HTML report available here: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts"
